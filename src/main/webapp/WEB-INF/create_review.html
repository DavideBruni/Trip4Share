  <title>Create a Review</title>
</head>

<body>
<div class="titlepage">
  <h3 >Currently Reviewing USERNAME</h3>
</div>

<div class="row justify-content-center pdn-top-30">
  <div class="col-xl-8 justify-content-center">
    <!-- Account details card-->
    <div class="card mb-4">
      <div class="card-header">Account Details</div>
      <div class="card-body ">
        <form action="createreview">
          <!-- Form Group (username)-->
          <div class="mb-3">
            <label class="small mb-1" for="inputRating">Rating (from 1 to 5) </label>
            <input class="form-control" id="inputRating" type="number" max="5" min="0" >
          </div>

          <div class="mb-3">
            <label class="small mb-1" for="inputReview">Email address</label>
            <textarea  class="form-control" id="inputReview" >Cosa ne pensi di Username </textarea>
          </div>

          <!-- Save changes button-->
          <a class="btn btn-primary pull-right" type="button" href="modify_info.html">Submit</a>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
